<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC Contested Zone: Squad Dashboard</title>
    <style>
        :root {
            --terminal-orange: #FF8C00;
            --terminal-bg: #000;
            --terminal-border: #333;
            --success-green: #00FF00;
            --error-red: #ef4444;
            --intel-blue: #0088ff;
        }

        body { background: #000; color: #fff; margin: 0; font-family: 'Courier New', monospace; -webkit-font-smoothing: antialiased; }
        .dashboard-container { padding: 10px; min-height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }

        /* --- SYNC HEADER --- */
        .sync-header {
            background: #050505; border-bottom: 2px solid var(--terminal-orange);
            padding: 12px; display: flex; flex-wrap: wrap; gap: 8px;
            align-items: center; position: sticky; top: 0; z-index: 100; margin-bottom: 15px;
        }
        .header-input { 
            background: #000; border: 1px solid #444; color: var(--terminal-orange); 
            padding: 10px; font-size: 14px; outline: none; flex: 1 1 120px; 
        }
        .conn-lamp { width: 12px; height: 12px; border-radius: 50%; background: #222; transition: 0.2s; }
        .lamp-ok { background: var(--success-green); box-shadow: 0 0 10px var(--success-green); }
        .lamp-syncing { background: var(--terminal-orange); box-shadow: 0 0 10px var(--terminal-orange); }

        /* --- MISSION UI --- */
        #mission-banner {
            display: none; background: rgba(0, 255, 0, 0.1); border: 2px solid var(--success-green);
            padding: 12px; margin-bottom: 20px; text-align: center; font-weight: bold;
            color: var(--success-green); font-size: 12px;
        }

        /* --- GRID LAYOUT --- */
        .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } }

        .lz-group { margin-bottom: 25px; }
        .lz-header { background: #111; padding: 10px; font-size: 11px; font-weight: 900; letter-spacing: 2px; border-left: 5px solid #444; margin-bottom: 10px; }
        .op-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }

        /* --- HERO HANGAR --- */
        .exec-hero { border: 2px solid var(--terminal-orange); background: rgba(255,140,0,0.05); padding: 20px; text-align: center; margin-bottom: 25px; }
        #h-timer { font-size: 60px; font-weight: 900; line-height: 1; margin: 10px 0; }
        .op-label { color: var(--terminal-orange); font-size: 10px; text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: bold; }
        #h-mini { font-size: 1.2em; color: lightgray; display: block; margin-top: 5px; }

        /* --- CARDS & BUTTONS --- */
        .data-card { border: 1px solid var(--terminal-border); background: rgba(10,10,10,0.8); padding: 12px; }
        .timer-val { font-size: 24px; font-weight: bold; margin: 5px 0; }
        .btn-terminal { 
            background: transparent; border: 1px solid var(--terminal-orange); color: var(--terminal-orange); 
            padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 11px; width: 100%; font-weight: 900;
        }
        .btn-adj { background: #111; border: 1px solid #444; color: #666; padding: 8px; cursor: pointer; font-size: 10px; width: 45px; }

        /* --- INVENTORY --- */
        .side-block { background: #0a0a0a; border: 2px solid #222; padding: 15px; margin-bottom: 15px; }
        .loc-title { font-size: 10px; font-weight: 900; display: block; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 8px; text-transform: uppercase; }
        .inv-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #111; margin-top: 5px; font-size: 12px; }
        .owner-tag { color: var(--intel-blue); font-size: 9px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="sync-header">
        <div id="sync-lamp" class="conn-lamp"></div>
        <input type="text" id="squad-code" class="header-input" placeholder="SQUAD_CODE">
        <input type="text" id="username" class="header-input" placeholder="OP_NAME">
        <button class="btn-terminal" style="flex: 1 1 100px;" onclick="syncWithCloud()">[ FETCH ]</button>
    </div>

    <div id="mission-banner">[ MISSION_COMPLETE: ALL CRITICAL KEYS SECURED ]</div>

    <div class="main-grid">
        <div class="ops-column">
            <div class="exec-hero">
                <span id="h-label" class="op-label">PRIMARY: HANGAR_STATUS</span>
                <div id="h-timer">00:00:00</div>
                <span id="h-mini">SYNCING DATA...</span>
            </div>

            <div class="lz-group">
                <div class="lz-header" style="border-color: var(--success-green)">ACCESS_KEYCARDS</div>
                <div class="op-grid">
                    <div class="data-card"><span class="op-label">KEY_3-4</span><div id="c1-timer" class="timer-val">READY</div><div style="display:flex; gap:5px;"><button class="btn-terminal" onclick="collectItem('c1','KEY_3-4',1800, 'Checkmate')">START</button><button class="btn-adj" onclick="adjustTimer('c1')">ADJ</button></div></div>
                    <div class="data-card"><span class="op-label">KEY_3-5</span><div id="c2-timer" class="timer-val">READY</div><div style="display:flex; gap:5px;"><button class="btn-terminal" onclick="collectItem('c2','KEY_3-5',1800, 'Orbit')">START</button><button class="btn-adj" onclick="adjustTimer('c2')">ADJ</button></div></div>
                </div>
            </div>
        </div>

        <div class="side-column">
            <div class="side-block">
                <span class="op-label">SQUAD_INVENTORY</span>
                <div id="inv-Checkmate"><span class="loc-title" style="color:var(--terminal-orange)">CHECKMATE</span></div>
                <div id="inv-Orbit"><span class="loc-title" style="color:var(--intel-blue)">ORBITUARY</span></div>
                <div id="inv-Ruin"><span class="loc-title" style="color:#fff">RUIN_STATION</span></div>
                <div id="inv-Personal"><span class="loc-title" style="color:var(--success-green)">IN_TRANSIT</span></div>
            </div>
            <button class="btn-terminal" style="border-color:var(--error-red); color:var(--error-red);" onclick="clearAllData()">[ WIPE_LOCAL ]</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: 'https://script.google.com/macros/s/AKfycbyBSHzDAa1tipoej3JPiWKFOVqZjfi05esA9Jnc2R6KWasgCbTEOSIkfuKOPUVnx7wXgQ/exec',
        RED_PHASE: 2 * 60 * 60,   // 2 hours
        GREEN_PHASE: 1 * 60 * 60, // 1 hour
        BLACK_PHASE: 5 * 60,      // 5 minutes
        TOTAL_CYCLE: (2 * 60 * 60) + (1 * 60 * 60) + (5 * 60)
    };
    const IDS = ['c1','c2','b1','b2','b3','b4','b5','b6','b7'];
    let cycleStart = null; 
    let inventory = [];

    // Fetch the reference timestamp directly like the source site
    fetch('/lib/cfg.dat')
        .then(res => res.text())
        .then(text => {
            cycleStart = parseInt(text.trim(), 10) * 1000;
        });

    function updateHangar() {
        if (!cycleStart) return;

        const elapsed = Math.floor((Date.now() - cycleStart) / 1000);
        const remainingInTotal = CONFIG.TOTAL_CYCLE - (elapsed % CONFIG.TOTAL_CYCLE);
        
        const timerEl = document.getElementById('h-timer');
        const labelEl = document.getElementById('h-label');
        const miniEl = document.getElementById('h-mini');

        // Main timer is the total cycle countdown
        timerEl.textContent = formatHHMMSS(remainingInTotal);

        if (remainingInTotal > CONFIG.GREEN_PHASE + CONFIG.BLACK_PHASE) {
            // RED PHASE
            const redRem = remainingInTotal - (CONFIG.GREEN_PHASE + CONFIG.BLACK_PHASE);
            labelEl.textContent = "Hangar Closed";
            labelEl.style.color = "red";
            miniEl.textContent = `Opens in ${formatHHMMSS(redRem)}`;
            timerEl.style.color = "var(--error-red)";
        } else if (remainingInTotal > CONFIG.BLACK_PHASE) {
            // GREEN PHASE
            const greenRem = remainingInTotal - CONFIG.BLACK_PHASE;
            labelEl.textContent = "Hangar Open";
            labelEl.style.color = "limegreen";
            miniEl.textContent = `Resets in ${formatHHMMSS(greenRem)}`;
            timerEl.style.color = "var(--success-green)";
        } else {
            // BLACK PHASE
            labelEl.textContent = "Hangar Resetting";
            labelEl.style.color = "yellow";
            miniEl.textContent = "";
            timerEl.style.color = "yellow";
        }
    }

    function formatHHMMSS(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    // --- OTHER SQUAD FUNCTIONS ---
    async function syncWithCloud() {
        const code = document.getElementById('squad-code').value; if(!code) return;
        setSyncUI('sync');
        const cb = 'cb_' + Date.now();
        window[cb] = (d) => {
            inventory = d.inventory || [];
            IDS.forEach(id => { if(d[id]) localStorage.setItem(`cz-${id}-timer`, d[id]); });
            renderUI(); setSyncUI('ok'); delete window[cb];
        };
        const s = document.createElement('script');
        s.src = `${CONFIG.URL}?groupCode=${code}&prefix=${cb}&t=${Date.now()}`;
        document.body.appendChild(s);
    }

    function renderUI() {
        ['Checkmate','Orbit','Ruin','Personal'].forEach(loc => {
            const cont = document.getElementById(`inv-${loc}`);
            cont.innerHTML = `<span class="loc-title">${loc === 'Personal' ? 'IN_TRANSIT' : loc.toUpperCase()}</span>`;
            inventory.filter(i => i.loc === loc).forEach(item => {
                cont.innerHTML += `<div class="inv-item"><div>${item.name}<br><span class="owner-tag">[ ${item.owner} ]</span></div></div>`;
            });
        });
    }

    function collectItem(id, name, sec, loc) {
        localStorage.setItem(`cz-${id}-timer`, Date.now() + (sec * 1000));
        syncWithCloud();
    }

    function setSyncUI(state) { document.getElementById('sync-lamp').className = 'conn-lamp ' + (state === 'ok' ? 'lamp-ok' : 'lamp-syncing'); }
    function clearAllData() { localStorage.clear(); location.reload(); }

    setInterval(() => {
        updateHangar();
        IDS.forEach(id => {
            const exp = parseInt(localStorage.getItem(`cz-${id}-timer`));
            const el = document.getElementById(`${id}-timer`);
            if (el && exp && exp > Date.now()) {
                const rem = Math.ceil((exp - Date.now())/1000);
                el.textContent = `${String(Math.floor(rem/60)).padStart(2,'0')}:${String(rem%60).padStart(2,'0')}`;
                el.style.color = 'var(--error-red)';
            } else if (el) {
                el.textContent = "READY";
                el.style.color = 'var(--success-green)';
            }
        });
    }, 1000);
</script>
</body>
</html>
